# Nginx конфиг для Анализатор WM
# Скопировать в /etc/nginx/sites-available/analizator
# Затем: sudo ln -s /etc/nginx/sites-available/analizator /etc/nginx/sites-enabled/
# Затем: sudo nginx -t && sudo systemctl reload nginx

# Замените YOUR_DOMAIN на ваш домен (или IP если домена нет)
server {
    listen 80;
    server_name 85.193.86.69;

    # Редирект HTTP → HTTPS (раскомментировать после получения SSL)
    # return 301 https://$host$request_uri;

    # Проксируем всё на Express (он сам раздаёт и API и frontend)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты для загрузки больших файлов
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        client_max_body_size 1G;
    }
}

